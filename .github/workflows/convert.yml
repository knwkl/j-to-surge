name: Convert Jinx Rules to Surge

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
    paths:
      - 'convert.py'
      - '.github/workflows/convert.yml'
      - 'surge/patch/**'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch upstream version.json
        id: version_check
        run: |
          UPSTREAM_VERSION=$(curl -sf \
            "https://raw.githubusercontent.com/VME98/jinx-rules/master/rules/version.json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('version', d.get('v', '')))" \
          )
          echo "upstream_version=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"
          echo "Upstream version: $UPSTREAM_VERSION"

          if [ -f surge/.upstream_version ]; then
            CACHED=$(cat surge/.upstream_version)
          else
            CACHED=""
          fi
          echo "cached_version=$CACHED" >> "$GITHUB_OUTPUT"
          echo "Cached version: $CACHED"

      - name: Skip if already up to date
        if: >
          steps.version_check.outputs.upstream_version != '' &&
          steps.version_check.outputs.upstream_version ==
          steps.version_check.outputs.cached_version
        run: |
          echo "Already up to date (version ${{ steps.version_check.outputs.upstream_version }}), skipping."
          exit 0

      - name: Download upstream rule files
        run: |
          BASE="https://raw.githubusercontent.com/VME98/jinx-rules/master/rules"
          mkdir -p rules
          FILES=(
            blacklist.txt
            blacklist_wildcard.txt
            whitelist.txt
            whitelist_wildcard.txt
            url_blacklist.txt
            url_whitelist.txt
            mitm_skip_domains.txt
          )
          for f in "${FILES[@]}"; do
            echo "Downloading $f ..."
            curl -sf "$BASE/$f" -o "rules/$f"
          done

      - name: Run conversion script
        run: |
          python3 convert.py rules surge

      - name: Write upstream version cache
        run: |
          echo "${{ steps.version_check.outputs.upstream_version }}" > surge/.upstream_version

      - name: Check for changes
        id: git_diff
        run: |
          git add surge/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.git_diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.version_check.outputs.upstream_version }}"
          if [ -n "$VERSION" ]; then
            MSG="chore: sync jinx-rules v${VERSION}"
          else
            MSG="chore: sync jinx-rules $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          git commit -m "$MSG"
          git push
